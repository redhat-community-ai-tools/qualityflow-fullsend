# harness/std-refiner.yaml — Iteratively review and fix an STD until APPROVED.
#
# File-only: reads STD and review locally, no external API calls needed.
agent: qualityflow/agents/std-refiner.md
description: "Review-refine loop that iterates until the STD reaches APPROVED verdict"
role: coder
slug: qualityflow-std-refiner
model: opus
image: ghcr.io/fullsend-ai/fullsend-code:latest
policy: policies/qf-vertex.yaml
agent_input: qualityflow/config

pre_script: scripts/pre-std-refiner.sh

host_files:
  - src: env/gcp-vertex.env
    dest: /sandbox/workspace/.env.d/gcp-vertex.env
    expand: true
  - src: ${GOOGLE_APPLICATION_CREDENTIALS}
    dest: /tmp/.gcp-credentials.json
  - src: ${GCP_OIDC_TOKEN_FILE}
    dest: /sandbox/workspace/.gcp-oidc-token
    optional: true
  - src: env/qf-credentials.env
    dest: /sandbox/workspace/.env.d/qf-credentials.env
    expand: true

skills:
  - qualityflow/skills/project-resolver
  - qualityflow/skills/review-rules-extractor
  - qualityflow/skills/std-reviewer
  - qualityflow/skills/output-validator

validation_loop:
  script: scripts/validate-std-review.sh
  max_iterations: 3

post_script: scripts/post-std-refiner.sh

runner_env:
  JIRA_TICKET: "${JIRA_TICKET}"
  FULLSEND_OUTPUT_SCHEMA: ${FULLSEND_DIR}/schemas/std-refiner-result.schema.json

timeout_minutes: 25
