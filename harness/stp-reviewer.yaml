# harness/stp-reviewer.yaml — Review an STP for QE quality and rule compliance.
#
# Needs Jira (curl) for source data comparison and GitHub (gh CLI) for PR context.
agent: qualityflow/agents/stp-reviewer.md
description: "Review an STP against QE standards using zero-trust verification"
role: review
slug: qualityflow-stp-reviewer
model: opus
image: ghcr.io/fullsend-ai/fullsend-code:latest
policy: policies/qf-full.yaml
agent_input: qualityflow/config

pre_script: scripts/pre-stp-reviewer.sh

host_files:
  - src: env/gcp-vertex.env
    dest: /sandbox/workspace/.env.d/gcp-vertex.env
    expand: true
  - src: ${GOOGLE_APPLICATION_CREDENTIALS}
    dest: /tmp/.gcp-credentials.json
  - src: ${GCP_OIDC_TOKEN_FILE}
    dest: /sandbox/workspace/.gcp-oidc-token
    optional: true
  - src: env/qf-credentials.env
    dest: /sandbox/workspace/.env.d/qf-credentials.env
    expand: true

skills:
  - qualityflow/skills/project-resolver
  - qualityflow/skills/review-rules-extractor
  - qualityflow/skills/stp-reviewer
  - qualityflow/skills/pr-analyzer
  - qualityflow/skills/jira-parser
  - qualityflow/skills/output-validator

validation_loop:
  script: scripts/validate-review.sh
  max_iterations: 2

post_script: scripts/post-stp-reviewer.sh

runner_env:
  JIRA_TICKET: "${JIRA_TICKET}"
  FULLSEND_OUTPUT_SCHEMA: ${FULLSEND_DIR}/schemas/stp-review-result.schema.json

timeout_minutes: 15
