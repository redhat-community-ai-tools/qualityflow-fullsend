# harness/std-builder.yaml — Generate STD YAML + test stubs from an STP.
#
# File-only: reads STP and config, no external API calls needed.
agent: qualityflow/agents/std-builder.md
description: "Generate STD YAML and test stubs from an approved STP"
role: coder
slug: qualityflow-std-builder
model: opus
image: ghcr.io/fullsend-ai/fullsend-code:latest
policy: policies/qf-vertex.yaml
agent_input: qualityflow/config

pre_script: scripts/pre-std-builder.sh

host_files:
  - src: env/gcp-vertex.env
    dest: /sandbox/workspace/.env.d/gcp-vertex.env
    expand: true
  - src: ${GOOGLE_APPLICATION_CREDENTIALS}
    dest: /tmp/.gcp-credentials.json
  - src: env/qf-credentials.env
    dest: /sandbox/workspace/.env.d/qf-credentials.env
    expand: true

skills:
  - qualityflow/skills/project-resolver
  - qualityflow/skills/std-orchestrator
  - qualityflow/skills/std-generator
  - qualityflow/skills/go-stub-generator
  - qualityflow/skills/python-stub-generator
  - qualityflow/skills/pipeline-state
  - qualityflow/skills/output-validator

validation_loop:
  script: scripts/validate-std.sh
  max_iterations: 2

post_script: scripts/post-std-builder.sh

runner_env:
  JIRA_TICKET: "${JIRA_TICKET}"
  REPO_FULL_NAME: "${REPO_FULL_NAME}"
  TARGET_BRANCH: "${TARGET_BRANCH}"
  FULLSEND_OUTPUT_SCHEMA: ${FULLSEND_DIR}/schemas/std-builder-result.schema.json

timeout_minutes: 15
