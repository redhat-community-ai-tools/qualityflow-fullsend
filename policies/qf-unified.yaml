version: 1

# Unified sandbox policy for the full QualityFlow pipeline.
# Superset of qf-full.yaml, qf-vertex.yaml, and qf-codegen.yaml.
# Used by: harness/qualityflow.yaml (unified entry point)

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  vertex_ai:
    name: vertex-ai
    endpoints:
      - host: "api.anthropic.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: "*.googleapis.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: "**/claude"
      - path: "**/node"

  jira:
    name: jira
    endpoints:
      - host: "*.atlassian.net"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: "**/curl"

  github:
    name: github
    endpoints:
      - host: "api.github.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: "github.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: "**/gh"
      - path: "**/git"
      - path: "**/curl"

  github_oidc:
    name: github-oidc
    endpoints:
      - host: "*.actions.githubusercontent.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: "**/claude"
      - path: "**/node"

  npm_registry:
    name: npm-registry
    endpoints:
      - host: "registry.npmjs.org"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: "**/npm"
      - path: "**/node"

  go_registries:
    name: go-registries
    endpoints:
      - host: "proxy.golang.org"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: "sum.golang.org"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: "storage.googleapis.com"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: "**/go"

  python_registries:
    name: python-registries
    endpoints:
      - host: "pypi.org"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
      - host: "files.pythonhosted.org"
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-write
    binaries:
      - path: "**/pip"
      - path: "**/pip3"
      - path: "**/python"
      - path: "**/python3"
