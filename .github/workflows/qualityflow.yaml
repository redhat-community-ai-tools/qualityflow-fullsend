          set -euo pipefail
          PR_NUMBER="${{ steps.pr-info.outputs.pr_number }}"
          TOTAL_COUNT="${TEST_TOTAL_COUNT:-0}"
          GO_COUNT="${TEST_GO_COUNT:-0}"
          PY_COUNT="${TEST_PY_COUNT:-0}"

          icon() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              *) echo "⏭️" ;;
            esac
          }

          # Build test output rows dynamically
          GO_DIRS="${{ steps.organize-tests.outputs.go_dirs }}"
          PY_DIRS="${{ steps.organize-tests.outputs.py_dirs }}"
          TEST_ROWS=""
          if [[ "${GO_COUNT}" -gt 0 ]]; then
            GO_LOC=$(echo "${GO_DIRS:-source tree}" | cut -d',' -f1)
            TEST_ROWS="${TEST_ROWS}
          | Go | **${GO_COUNT}** files | \`${GO_LOC}/qf_*_test.go\` |"
          fi
          if [[ "${PY_COUNT}" -gt 0 ]]; then
            PY_LOC=$(echo "${PY_DIRS:-source tree}" | cut -d',' -f1)
            TEST_ROWS="${TEST_ROWS}
          | Python | **${PY_COUNT}** files | \`${PY_LOC}/qf_test_*.py\` |"
          fi
          if [[ -z "${TEST_ROWS}" ]]; then
            TEST_ROWS="
          | — | **${TOTAL_COUNT}** files | co-located in source tree |"
          fi

          BODY="<!-- qf-summary -->
          ## QualityFlow Pipeline Summary

          | Stage | Agent | Status |
          |-------|-------|--------|
          | 1 | STP Builder | $(icon "${S1_OUTCOME}") |
          | 2 | STP Reviewer | $(icon "${S2_OUTCOME}") |
          | 3 | STP Refiner | $(icon "${S3_OUTCOME}") |
          | 4 | STD Builder | $(icon "${S4_OUTCOME}") |
          | 5 | STD Reviewer | $(icon "${S5_OUTCOME}") |
          | 6 | STD Refiner | $(icon "${S6_OUTCOME}") |
          | 7 | Test Generator | $(icon "${S7_OUTCOME}") |

          ### Test Output
          | Language | Count | Location |
          |----------|-------|----------|${TEST_ROWS}

          $(if [[ "${ISSUE_SOURCE}" == "github" ]]; then
            echo "**Issue:** [${JIRA_TICKET}](https://github.com/${{ github.repository }}/issues/${JIRA_TICKET#GH-})"
          else
            echo "**Jira:** [${JIRA_TICKET}](${{ secrets.JIRA_URL || 'https://your-jira.example.com' }}/browse/${JIRA_TICKET})"
          fi)

          ---
          *Generated by [QualityFlow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})*"

          # Strip leading whitespace from heredoc indentation
          BODY=$(echo "${BODY}" | sed 's/^          //')

          EXISTING_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | contains("<!-- qf-summary -->")) | .id' 2>/dev/null | head -1 || true)

          if [[ -n "${EXISTING_ID}" ]]; then
            gh api --method PATCH "repos/${{ github.repository }}/issues/comments/${EXISTING_ID}" \
              -f body="${BODY}"
            echo "::notice::Updated existing summary comment #${EXISTING_ID}"
          else
            gh api --method POST "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              -f body="${BODY}"
            echo "::notice::Posted new summary comment on PR #${PR_NUMBER}"
          fi
